<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 太极图：实底圆 + 白色鱼形 + 双眼。圆盘内部不留透明区域。 -->
  <g transform="translate(50,50)">
    <!-- 黑色鱼形作为底色，兼作外圈，避免两条路径拼接产生透明细缝。 -->
    <circle cx="0" cy="0" r="45" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="1"/>
    <!-- 白色鱼形：左外弧 + 下方圆腹。 -->
    <path d="M 0,-45 A 45,45 0 0 0 0,45 A 22.5,22.5 0 0 0 0,0 A 22.5,22.5 0 0 1 0,-45 Z"
          fill="#f4f1ea"/>
    <!-- 鱼眼使用对侧颜色：上方黑鱼白眼，下方白鱼黑眼。 -->
    <circle cx="0" cy="-22.5" r="6" fill="#f4f1ea"/>
    <circle cx="0" cy="22.5" r="6" fill="#1a1a1a"/>
  </g>
</svg>
