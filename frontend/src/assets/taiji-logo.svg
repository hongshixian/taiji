<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 太极图：白+黑两半 + 双眼。无背景层、无透明度，描边内缩避免裁切 -->
  <g transform="translate(50,50)">
    <!-- 左半（阳，白；S 曲线让白色重心在下方、上方有黑色侵入小圆） -->
    <path d="M 0,-45 A 45,45 0 0 0 0,45 A 22.5,22.5 0 0 0 0,0 A 22.5,22.5 0 0 1 0,-45 Z"
          fill="#f4f1ea"/>
    <!-- 右半（阴，黑；与白半镜像，黑色重心在上方、下方有白色侵入小圆） -->
    <path d="M 0,-45 A 45,45 0 0 1 0,45 A 22.5,22.5 0 0 1 0,0 A 22.5,22.5 0 0 0 0,-45 Z"
          fill="#1a1a1a"/>
    <!-- 上眼（位于黑色侵入白半的小圆中心，应为白点 — 阳中之阴的视觉中心） -->
    <circle cx="0" cy="-22.5" r="6" fill="#f4f1ea"/>
    <!-- 下眼（位于白色侵入黑半的小圆中心，应为黑点 — 阴中之阳的视觉中心） -->
    <circle cx="0" cy="22.5" r="6" fill="#1a1a1a"/>
    <!-- 外圈描边（内缩 0.5 避免裁切） -->
    <circle cx="0" cy="0" r="45" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  </g>
</svg>
