services:
  # ─── Redis ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ─── Flask 后端 ────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_URL=sqlite:////app/data/taiji.db
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - TASK_LOG_ROOT=/app/logs
      # HF 镜像（国内加速）与缓存
      - HF_ENDPOINT=${HF_ENDPOINT:-https://hf-mirror.com}
      - HF_HOME=/app/hf_cache
      - HF_DATASETS_CACHE=/app/hf_cache/datasets
      - HUGGINGFACE_HUB_CACHE=/app/hf_cache/hub
      # 初始管理员（仅首次部署生效；ADMIN_PASSWORD 未设则随机生成并打印到日志）
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@taiji.local}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./app_data:/app/data
      - ./app_logs:/app/logs
      - ./hf_cache:/app/hf_cache
    restart: unless-stopped

  # ─── Celery Worker ─────────────────────────────
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    command: ["celery", "-A", "celery_app", "worker", "-l", "info", "--concurrency=4", "--max-tasks-per-child=10", "-Ofair"]
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_URL=sqlite:////app/data/taiji.db
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - TASK_LOG_ROOT=/app/logs
      - RUN_MIGRATIONS=false
      # HF 镜像（国内加速）与缓存
      - HF_ENDPOINT=${HF_ENDPOINT:-https://hf-mirror.com}
      - HF_HOME=/app/hf_cache
      - HF_DATASETS_CACHE=/app/hf_cache/datasets
      - HUGGINGFACE_HUB_CACHE=/app/hf_cache/hub
      # inspect_ai 日志级别
      - INSPECT_LOG_LEVEL=info
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./app_data:/app/data
      - ./app_logs:/app/logs
      - ./hf_cache:/app/hf_cache
    restart: unless-stopped

  # ─── Vue 前端 ──────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
