# inspect_evals 引擎的 suite 定义
# ==================================================================
# 字段说明：
#   key                : 平台内部唯一 key（snake_case）
#   display_name       : 前端展示名（保持与 Leaderboard 一致）
#   category           : capability / safety / alignment
#   engine_ref         : inspect_ai/inspect_evals 中的 task 引用
#   needs_judge        : 是否需要评委模型（前端条件展示"评委模型"下拉）
#   judge_arg          : 若通过任务参数传评委（如 task_args["judge_model"]）
#   judge_role_bindings: 若通过 --model-role 覆盖辅助 role（同一评委绑定到多个 role）
#   needs_sandbox      : 是否需要 docker sandbox（一期禁用）
#   default_config     : per-suite 默认配置（会合并入 execution 或 suite_config）
#   config_schema      : 前端 dynamic form 用的字段描述
#   disabled           : 是否禁用；一期把无法映射的、需 sandbox 的 mark disabled
#   disabled_reason    : 禁用原因（前端 tooltip）
#   notes              : 前端 tooltip 说明
# ==================================================================

suites:

