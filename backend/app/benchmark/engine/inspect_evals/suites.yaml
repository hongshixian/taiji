# ==================================================================
# 平台默认 execution_config（可被 suite.default_config.execution 覆盖）
# ==================================================================
default_execution_config:
  limit: 20                # 一期默认冒烟量：20 条
  epochs: 1
  max_connections: 10
  timeout_minutes: 60


# ==================================================================
# 供前端 dynamic form 消费的 execution 字段声明
# ==================================================================
execution_schema:
  fields:
    - key: limit
      type: preset_int
      label: 样本数量
      presets:
        - {label: "快速冒烟 (20)", value: 20}
        - {label: "标准评测 (200)", value: 200}
        - {label: "完整评测 (全部)", value: null}
      allow_custom: true
      min: 1
      max: 20000
    - key: epochs
      type: int
      label: 重复次数
      default: 1
      min: 1
      max: 10
    - key: max_connections
      type: int
      label: 并发数
      default: 10
      min: 1
      max: 100
    - key: timeout_minutes
      type: int
      label: 超时（分钟）
      default: 60
      min: 5
      max: 720
